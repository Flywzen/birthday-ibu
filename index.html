<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sebuah hadiah kecil berisi doa, kenangan, dan rasa terima kasih untuk Mama." />
    <title>Selamat Ulang Tahun, Mama</title>

    <!-- Favicon & home-screen icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#FFF8F8" />

    <!-- Open Graph: how the link looks when shared (WhatsApp, etc.) -->
    <!-- TODO WAJIB: og:image dan twitter:image HARUS URL absolut (https://...),
         bukan path relatif, atau preview gambarnya gak muncul di WhatsApp/FB.
         Ganti "https://GANTI-DENGAN-DOMAIN-KAMU" di bawah setelah deploy,
         misal: https://birthday-ibu.vercel.app/og-image.jpg -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Selamat Ulang Tahun, Mama" />
    <meta
      property="og:description"
      content="Sebuah hadiah kecil berisi doa, kenangan, dan rasa terima kasih untuk Mama."
    />
    <meta property="og:image" content="https://GANTI-DENGAN-DOMAIN-KAMU/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter card (some apps fall back to this) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Selamat Ulang Tahun, Mama" />
    <meta
      name="twitter:description"
      content="Sebuah hadiah kecil berisi doa, kenangan, dan rasa terima kasih untuk Mama."
    />
    <meta name="twitter:image" content="https://GANTI-DENGAN-DOMAIN-KAMU/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
